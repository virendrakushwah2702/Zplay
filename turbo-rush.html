<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Turbo Rush - ZPlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0a0a0f;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding-top: 8px;
  }
  .zplay-brand {
    position: fixed;
    top: 10px;
    right: 14px;
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255, 255, 255, 0.3);
    font-weight: 600;
    z-index: 100;
    pointer-events: none;
  }
  #wrap {
    position: relative;
    width: 400px;
    height: 650px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(99, 102, 241, 0.25), 0 20px 60px rgba(0,0,0,0.6);
  }
  canvas {
    display: block;
    width: 400px;
    height: 650px;
    background: #0f0c29;
    touch-action: none;
  }
  .bottom-bar {
    margin-top: 14px;
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  .bottom-bar button {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .bottom-bar button:hover {
    background: rgba(99, 102, 241, 0.3);
    border-color: rgba(99, 102, 241, 0.5);
  }
  .bottom-bar button:active {
    transform: scale(0.96);
  }
  @media (max-width: 420px) {
    #wrap { width: 100vw; height: calc(100vw * 1.625); max-height: calc(100vh - 100px); }
    canvas { width: 100%; height: 100%; }
  }
</style>
</head>
<body>

<div class="zplay-brand">ZPLAY</div>

<div id="wrap">
  <canvas id="game" width="400" height="650"></canvas>
</div>

<div class="bottom-bar">
  <button id="shareBtn">Share 🔗</button>
  <button id="likeBtn">❤️ Like</button>
  <button id="remixBtn">Remix 🎨</button>
</div>

<script>
(function() {
  'use strict';

  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  var W = 400, H = 650;

  function roundRect(x, y, w, h, r) {
    if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
    ctx.beginPath();
    ctx.moveTo(x + r.tl, y);
    ctx.lineTo(x + w - r.tr, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
    ctx.lineTo(x + w, y + h - r.br);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
    ctx.lineTo(x + r.bl, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
    ctx.lineTo(x, y + r.tl);
    ctx.quadraticCurveTo(x, y, x + r.tl, y);
    ctx.closePath();
  }

  function shade(hex, percent) {
    hex = hex.replace('#', '');
    var r = parseInt(hex.substring(0, 2), 16);
    var g = parseInt(hex.substring(2, 4), 16);
    var b = parseInt(hex.substring(4, 6), 16);
    r = Math.max(0, Math.min(255, Math.floor(r * (100 + percent) / 100)));
    g = Math.max(0, Math.min(255, Math.floor(g * (100 + percent) / 100)));
    b = Math.max(0, Math.min(255, Math.floor(b * (100 + percent) / 100)));
    return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
  }

  var audioCtx = null;
  var noiseBuffer = null;
  function ensureAudio() {
    try {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        var bufferSize = audioCtx.sampleRate * 0.5;
        noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        var data = noiseBuffer.getChannelData(0);
        for (var i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch (e) { }
  }

  function playEngine() {
    try {
      if (!audioCtx) return;
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = 70;
      gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    } catch (e) { }
  }

  function playCrash() {
    try {
      if (!audioCtx || !noiseBuffer) return;
      var src = audioCtx.createBufferSource();
      var gain = audioCtx.createGain();
      var filter = audioCtx.createBiquadFilter();
      src.buffer = noiseBuffer;
      filter.type = 'lowpass';
      filter.frequency.value = 1200;
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      src.connect(filter).connect(gain).connect(audioCtx.destination);
      src.start();
      src.stop(audioCtx.currentTime + 0.4);
    } catch (e) { }
  }

  function playScore() {
    try {
      if (!audioCtx) return;
      var freqs = [523, 659, 784, 1047];
      freqs.forEach(function(f, i) {
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        var t = audioCtx.currentTime + i * 0.08;
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(0.15, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(t);
        osc.stop(t + 0.2);
      });
    } catch (e) { }
  }

  var LANES = 3;
  var ROAD_LEFT = 40;
  var ROAD_RIGHT = 360;
  var ROAD_WIDTH = ROAD_RIGHT - ROAD_LEFT;
  var LANE_WIDTH = ROAD_WIDTH / LANES;
  function laneX(idx) { return ROAD_LEFT + LANE_WIDTH * (idx + 0.5); }

  var state = {
    mode: 'title',
    score: 0,
    best: 0,
    lives: 3,
    speed: 4,
    maxSpeed: 15,
    spawnInterval: 88,
    minSpawnInterval: 38,
    scoreInterval: 18,
    frame: 0,
    scrollOffset: 0,
    player: {
      lane: 1,
      x: laneX(1),
      targetX: laneX(1),
      y: 540,
      w: 36,
      h: 64
    },
    enemies: [],
    particles: [],
    popups: [],
    trees: [],
    engineCounter: 0,
    newBest: false
  };

  for (var ti = 0; ti < 8; ti++) {
    state.trees.push({ side: -1, y: Math.random() * H, scale: 0.5 + Math.random() * 0.4 });
    state.trees.push({ side: 1, y: Math.random() * H, scale: 0.5 + Math.random() * 0.4 });
  }

  var ENEMY_COLORS = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#06b6d4', '#a855f7', '#ec4899'];

  function spawnEnemy() {
    var lane = Math.floor(Math.random() * LANES);
    var color = ENEMY_COLORS[Math.floor(Math.random() * ENEMY_COLORS.length)];
    state.enemies.push({
      lane: lane,
      x: laneX(lane),
      y: -80,
      w: 36,
      h: 64,
      color: color,
      speed: state.speed * (0.7 + Math.random() * 0.3)
    });
  }

  function spawnParticles(x, y) {
    for (var i = 0; i < 20; i++) {
      var angle = (Math.PI * 2 * i) / 20 + Math.random() * 0.4;
      var speed = 2 + Math.random() * 5;
      state.particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 30, maxLife: 30,
        color: Math.random() < 0.5 ? '#ef4444' : '#fbbf24',
        size: 2 + Math.random() * 3
      });
    }
  }

  function spawnPopup(x, y, text) {
    state.popups.push({ x: x, y: y, text: text, life: 50, maxLife: 50 });
  }

  function drawCar(x, y, w, h, color, isPlayer) {
    ctx.save();
    ctx.shadowColor = isPlayer ? '#6366f1' : color;
    ctx.shadowBlur = isPlayer ? 22 : 12;
    var grad = ctx.createLinearGradient(x - w/2, y - h/2, x + w/2, y + h/2);
    grad.addColorStop(0, shade(color, 30));
    grad.addColorStop(0.5, color);
    grad.addColorStop(1, shade(color, -25));
    ctx.fillStyle = grad;
    roundRect(x - w/2, y - h/2, w, h, 8);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = shade(color, -40);
    roundRect(x - w/2 + 6, y - h/4, w - 12, h/2, 5);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    roundRect(x - w/2 + 8, y - h/4 + 3, w - 16, h/4, 3);
    ctx.fill();
    ctx.shadowColor = '#fde047';
    ctx.shadowBlur = 18;
    ctx.fillStyle = '#fef9c3';
    ctx.beginPath();
    ctx.arc(x - w/2 + 8, y - h/2 + 4, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + w/2 - 8, y - h/2 + 4, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowColor = '#ef4444';
    ctx.shadowBlur = 14;
    ctx.fillStyle = '#dc2626';
    ctx.beginPath();
    ctx.arc(x - w/2 + 7, y + h/2 - 5, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + w/2 - 7, y + h/2 - 5, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawTree(x, y, scale) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.fillStyle = '#3b2415';
    ctx.fillRect(-2, 0, 4, 10);
    ctx.shadowColor = '#22c55e';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#16a34a';
    ctx.beginPath();
    ctx.moveTo(0, -14);
    ctx.lineTo(-9, 4);
    ctx.lineTo(9, 4);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#22c55e';
    ctx.beginPath();
    ctx.arc(0, -6, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawRoad() {
    var sky = ctx.createLinearGradient(0, 0, 0, 90);
    sky.addColorStop(0, '#0f0c29');
    sky.addColorStop(1, '#24243e');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, 90);
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(ROAD_LEFT, 0, ROAD_WIDTH, H);
    ctx.save();
    ctx.shadowColor = '#6366f1';
    ctx.shadowBlur = 14;
    ctx.strokeStyle = '#6366f1';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(ROAD_LEFT, 0);
    ctx.lineTo(ROAD_LEFT, H);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ROAD_RIGHT, 0);
    ctx.lineTo(ROAD_RIGHT, H);
    ctx.stroke();
    ctx.restore();
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
    ctx.lineWidth = 2;
    ctx.setLineDash([30, 25]);
    var dashOffset = -state.scrollOffset % 55;
    for (var i = 1; i < LANES; i++) {
      var x = ROAD_LEFT + LANE_WIDTH * i;
      ctx.beginPath();
      ctx.moveTo(x, dashOffset - 30);
      ctx.lineTo(x, H);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x, dashOffset + 25);
      ctx.lineTo(x, 0);
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  function drawHUD() {
    ctx.save();
    ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
    roundRect(10, 10, 86, 48, 8);
    ctx.fill();
    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('SCORE', 20, 26);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 22px sans-serif';
    ctx.fillText(String(state.score), 20, 50);
    ctx.restore();

    ctx.save();
    ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
    roundRect(W - 96, 10, 86, 48, 8);
    ctx.fill();
    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('BEST', W - 86, 26);
    ctx.fillStyle = '#facc15';
    ctx.font = 'bold 22px sans-serif';
    ctx.fillText(String(state.best), W - 86, 50);
    ctx.restore();

    ctx.save();
    ctx.font = '22px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    var hearts = '';
    for (var h = 0; h < 3; h++) {
      hearts += h < state.lives ? '❤️' : '🖤';
    }
    ctx.fillText(hearts, W / 2, 30);
    ctx.restore();

        ctx.save();
    ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
    roundRect(10, H - 46, 130, 36, 18);
    ctx.fill();
    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('SPEED', 22, H - 33);
    ctx.fillStyle = '#a5b4fc';
    ctx.font = 'bold 16px sans-serif';
    ctx.fillText(Math.round(state.speed * 28) + ' km/h', 22, H - 18);
    ctx.restore();
  }
  function resetGame(){state.mode='playing';state.score=0;state.lives=3;state.speed=4;state.spawnInterval=88;state.frame=0;state.scrollOffset=0;state.engineCounter=0;state.newBest=false;state.player.lane=1;state.player.x=laneX(1);state.player.targetX=laneX(1);state.enemies.length=0;state.particles.length=0;state.popups.length=0;}
  function startGame(){ensureAudio();resetGame();}
  function gameOver(){state.mode='gameover';if(state.score>state.best){state.best=state.score;state.newBest=true;}else{state.newBest=false;}playCrash();}
  function update(){
    if(state.mode==='playing'){
      state.frame++;state.scrollOffset+=state.speed;
      if(state.frame%state.scoreInterval===0){var ns=state.score+1;if(ns%10===0){spawnPopup(state.player.x,state.player.y-40,'+10 '+'\uD83C\uDF89');playScore();}state.score=ns;}
      state.speed=Math.min(state.maxSpeed,4+0.3*Math.floor(state.score/5));
      state.spawnInterval=Math.max(state.minSpawnInterval,88-state.score);
      state.engineCounter++;if(state.engineCounter%14===0)playEngine();
      if(state.frame%state.spawnInterval===0)spawnEnemy();
      state.player.x+=(state.player.targetX-state.player.x)*0.18;
      for(var i=state.enemies.length-1;i>=0;i--){var e=state.enemies[i];e.y+=e.speed;if(e.y>H+80){state.enemies.splice(i,1);continue;}if(Math.abs(e.x-state.player.x)<(e.w+state.player.w)*0.35&&Math.abs(e.y-state.player.y)<(e.h+state.player.h)*0.4){spawnParticles(state.player.x,state.player.y);playCrash();state.enemies.splice(i,1);state.lives--;if(state.lives<=0){gameOver();break;}else{state.player.targetX=laneX(1);}}}
    }
    for(var pi=state.particles.length-1;pi>=0;pi--){var p=state.particles[pi];p.x+=p.vx;p.y+=p.vy;p.vx*=0.94;p.vy*=0.94;p.life--;if(p.life<=0)state.particles.splice(pi,1);}
    for(var pj=state.popups.length-1;pj>=0;pj--){var pp=state.popups[pj];pp.y-=1.2;pp.life--;if(pp.life<=0)state.popups.splice(pj,1);}
    for(var tk=0;tk<state.trees.length;tk++){var tr=state.trees[tk];var ma=(state.mode==='playing')?state.speed*0.6:(state.mode==='title'?1.5:0);tr.y+=ma;tr.scale+=0.005;if(tr.y>H+20){tr.y=-20;tr.scale=0.4;}}
  }
  function render(){
    ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,W,H);drawRoad();
    for(var ti=0;ti<state.trees.length;ti++){var ttr=state.trees[ti];var tx=ttr.side<0?(ROAD_LEFT-14):(ROAD_RIGHT+14);drawTree(tx,ttr.y,ttr.scale);}
    if(state.mode==='playing'||state.mode==='gameover'){for(var ei=0;ei<state.enemies.length;ei++){var en=state.enemies[ei];drawCar(en.x,en.y,en.w,en.h,en.color,false);}drawCar(state.player.x,state.player.y,state.player.w,state.player.h,'#6366f1',true);}
    for(var pai=0;pai<state.particles.length;pai++){var pa=state.particles[pai];var al=pa.life/pa.maxLife;ctx.save();ctx.globalAlpha=al;ctx.fillStyle=pa.color;ctx.shadowColor=pa.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(pa.x,pa.y,pa.size,0,Math.PI*2);ctx.fill();ctx.restore();}
    for(var pbi=0;pbi<state.popups.length;pbi++){var pbp=state.popups[pbi];var pA=pbp.life/pbp.maxLife;ctx.save();ctx.globalAlpha=pA;ctx.fillStyle='#fef3c7';ctx.shadowColor='#facc15';ctx.shadowBlur=12;ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.fillText(pbp.text,pbp.x,pbp.y);ctx.restore();}
    if(state.mode==='playing')drawHUD();
    if(state.mode==='title')drawTitleScreen();else if(state.mode==='gameover')drawGameOverScreen();
  }
  function drawTitleScreen(){
    ctx.save();ctx.fillStyle='rgba(10, 10, 20, 0.72)';ctx.fillRect(0,0,W,H);
    var cx=W/2,cy=H/2,cw=300,ch=280;
    ctx.fillStyle='rgba(20, 20, 35, 0.92)';ctx.strokeStyle='#6366f1';ctx.lineWidth=2;ctx.shadowColor='#6366f1';ctx.shadowBlur=24;
    roundRect(cx-cw/2,cy-ch/2,cw,ch,18);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='bold 40px sans-serif';ctx.fillStyle='#ffffff';ctx.fillText('TURBO',cx,cy-80);
    ctx.fillStyle='#a78bfa';ctx.shadowColor='#6366f1';ctx.shadowBlur=16;ctx.fillText('RUSH '+'\uD83C\uDFCE\uFE0F',cx,cy-38);ctx.shadowBlur=0;
    ctx.font='13px sans-serif';ctx.fillStyle='rgba(255,255,255,0.7)';ctx.fillText('Tap left/right to change lanes',cx,cy+4);
    var bw=150,bh=42,br=21,bx=cx-bw/2,by=cy+30;
    var bg=ctx.createLinearGradient(bx,by,bx+bw,by+bh);bg.addColorStop(0,'#6366f1');bg.addColorStop(1,'#a855f7');
    ctx.fillStyle=bg;ctx.shadowColor='#6366f1';ctx.shadowBlur=18;roundRect(bx,by,bw,bh,br);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='#ffffff';ctx.font='bold 14px sans-serif';ctx.fillText('TAP TO START '+'\u26A1',cx,by+bh/2+1);
    ctx.font='11px sans-serif';ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillText('Click anywhere to begin',cx,cy+100);
    ctx.restore();
  }
  function drawGameOverScreen(){
    ctx.save();ctx.fillStyle='rgba(10, 10, 20, 0.8)';ctx.fillRect(0,0,W,H);
    var cx=W/2,cy=H/2,cw=300,ch=320;
    ctx.fillStyle='rgba(25, 15, 20, 0.95)';ctx.strokeStyle='#ef4444';ctx.lineWidth=2;ctx.shadowColor='#ef4444';ctx.shadowBlur=24;
    roundRect(cx-cw/2,cy-ch/2,cw,ch,18);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='bold 32px sans-serif';ctx.fillStyle='#ffffff';ctx.fillText('CRASHED! '+'\uD83D\uDCA5',cx,cy-100);
    ctx.font='bold 50px sans-serif';ctx.fillStyle='#fef3c7';ctx.shadowColor='#facc15';ctx.shadowBlur=14;ctx.fillText(String(state.score),cx,cy-30);ctx.shadowBlur=0;
    ctx.font='12px sans-serif';ctx.fillStyle='rgba(255,255,255,0.6)';ctx.fillText('FINAL SCORE',cx,cy+5);
    if(state.newBest){ctx.font='bold 16px sans-serif';ctx.fillStyle='#facc15';ctx.shadowColor='#facc15';ctx.shadowBlur=12;ctx.fillText('NEW BEST! '+'\uD83C\uDFC6',cx,cy+35);ctx.shadowBlur=0;}else{ctx.font='bold 14px sans-serif';ctx.fillStyle='#a78bfa';ctx.fillText('BEST: '+state.best,cx,cy+35);}
    var bw=170,bh=42,br=21,bx=cx-bw/2,by=cy+60;
    var bg=ctx.createLinearGradient(bx,by,bx+bw,by+bh);bg.addColorStop(0,'#6366f1');bg.addColorStop(1,'#a855f7');
    ctx.fillStyle=bg;ctx.shadowColor='#6366f1';ctx.shadowBlur=18;roundRect(bx,by,bw,bh,br);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='#ffffff';ctx.font='bold 14px sans-serif';ctx.fillText('PLAY AGAIN '+'\uD83D\uDE97',cx,by+bh/2+1);
    ctx.font='11px sans-serif';ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillText('Click anywhere to restart',cx,cy+130);
    ctx.restore();
  }
  var touchStartX=null;
  function handleTap(clientX){if(state.mode==='title'){startGame();return;}if(state.mode==='gameover'){startGame();return;}if(state.mode==='playing'){var rect=canvas.getBoundingClientRect();var scaleX=canvas.width/rect.width;var x=(clientX-rect.left)*scaleX;if(x<W/2)moveLane(-1);else moveLane(1);}}
  function moveLane(dir){if(state.mode!=='playing')return;var nl=Math.max(0,Math.min(LANES-1,state.player.lane+dir));if(nl!==state.player.lane){state.player.lane=nl;state.player.targetX=laneX(nl);}}
  canvas.addEventListener('click',function(e){ensureAudio();handleTap(e.clientX);});
  canvas.addEventListener('touchstart',function(e){e.preventDefault();ensureAudio();if(e.touches.length>0){touchStartX=e.touches[0].clientX;handleTap(e.touches[0].clientX);}},{passive:false});
  canvas.addEventListener('touchend',function(e){e.preventDefault();if(touchStartX!==null&&e.changedTouches.length>0&&state.mode==='playing'){var dx=e.changedTouches[0].clientX-touchStartX;if(Math.abs(dx)>30)moveLane(dx<0?-1:1);}touchStartX=null;},{passive:false});
  window.addEventListener('keydown',function(e){if(e.key==='ArrowLeft'){e.preventDefault();ensureAudio();moveLane(-1);}else if(e.key==='ArrowRight'){e.preventDefault();ensureAudio();moveLane(1);}else if((e.key===' '||e.key==='Enter')&&state.mode!=='playing'){e.preventDefault();ensureAudio();startGame();}});
  document.getElementById('shareBtn').addEventListener('click',function(){var text='I scored '+state.best+' in Turbo Rush on Zplay! https://zplay.ai';window.open('https://wa.me/?text='+encodeURIComponent(text));});
  document.getElementById('likeBtn').addEventListener('click',function(e){var btn=e.currentTarget;btn.style.background='rgba(236, 72, 153, 0.3)';btn.style.borderColor='rgba(236, 72, 153, 0.6)';setTimeout(function(){btn.style.background='';btn.style.borderColor='';},400);});
  document.getElementById('remixBtn').addEventListener('click',function(){var colors=['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#a855f7','#ec4899','#6366f1'];var c=colors[Math.floor(Math.random()*colors.length)];document.getElementById('wrap').style.boxShadow='0 0 80px '+c+', 0 20px 60px rgba(0,0,0,0.6)';});
  function loop(){update();render();requestAnimationFrame(loop);}loop();
})();
</script>
</body>
</html>
